<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holyrood eDNA Frequency</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/css/main.css">
</head>
<body>

<header>
  <h1>Holyrood eDNA Frequency</h1>
  <p>Task 2.5 — Subsea observatory species % frequency calculator</p>
</header>

<div class="layout">

  <div class="card">
    <div class="card-title">Species Count Input</div>
    <div id="species-inputs"></div>
    <button class="calc-btn" onclick="calculate()">Calculate Frequencies</button>
  </div>

  <div class="card" id="results-card">
    <div class="card-title">Results</div>
    <div id="results-body">
      <div class="placeholder">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 7v6"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>
        <div>Enter species counts and press Calculate</div>
      </div>
    </div>
  </div>

</div>

<script>
const SPECIES = [
  'Snow crab (C. opilio)',
  'Acadian hermit crab (P. acadianus)',
  'W. Atlantic Hairy Hermit Crab (P. arcuatus)',
  'European Green Crab (C. maenas)',
  'Rock Crab (C. pagurus)',
  'Jonah Crab (C. borealis)',
  'Spiny Sunstar (C. papposus)',
  'Sea Urchin (S. droebachiensis)',
  'Boreal Sea Star (B. asterias)',
  'Daisy brittle star (O. aculeata)',
];

const inputsEl = document.getElementById('species-inputs');
SPECIES.forEach((name, i) => {
  const row = document.createElement('div');
  row.className = 'stat-row';
  row.innerHTML = `
    <span class="stat-label">${name}</span>
    <input type="number" id="sp-${i}" min="0" value="0"
      style="width:80px;text-align:right;background:var(--bg);border:1px solid var(--border);
             border-radius:var(--radius-sm);color:var(--text);font-family:'Space Mono',monospace;
             font-size:0.9rem;padding:4px 8px;outline:none;"
      onfocus="this.style.borderColor='var(--accent)'"
      onblur="this.style.borderColor='var(--border)'">
  `;
  inputsEl.appendChild(row);
});

function calculate() {
  const counts = SPECIES.map((_, i) => Math.max(0, parseFloat(document.getElementById('sp-' + i).value) || 0));
  const total  = counts.reduce((a, b) => a + b, 0);
  if (total === 0) {
    document.getElementById('results-body').innerHTML =
      '<div class="placeholder"><div>Total is zero — enter at least one count.</div></div>';
    return;
  }

  const gridStyle = 'display:grid;grid-template-columns:1fr 64px 96px;gap:0 8px;align-items:center;';
  const monoSm = 'font-family:"Space Mono",monospace;font-size:0.78rem;text-align:right;';

  const rows = SPECIES.map((name, i, arr) => {
    const pct = (counts[i] / total) * 100;
    const isLast = i === arr.length - 1;
    return `<div style="${gridStyle}padding:5px 0;${isLast ? 'border-bottom:none' : 'border-bottom:1px solid var(--border)'}">
      <span class="stat-label">${name}</span>
      <span style="${monoSm}color:var(--text-dim)">${counts[i]}</span>
      <span style="${monoSm}color:var(--text);font-weight:700">${pct.toFixed(2)}%</span>
    </div>`;
  }).join('');

  document.getElementById('results-body').innerHTML = `
    <div style="${gridStyle}padding:4px 0 6px;border-bottom:2px solid var(--border)">
      <span style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">Species</span>
      <span style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-muted);letter-spacing:0.08em;text-align:right">Count</span>
      <span style="font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--text-muted);letter-spacing:0.08em;text-align:right">% Freq</span>
    </div>
    ${rows}
    <div style="${gridStyle}padding:6px 0 4px;border-top:2px solid var(--border)">
      <span class="stat-label" style="font-weight:600">Total</span>
      <span style="${monoSm}color:var(--text-dim)">${total}</span>
      <span style="${monoSm}color:var(--accent);font-weight:700">100.00%</span>
    </div>`;
}
</script>
</body>
</html>
