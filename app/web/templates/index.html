<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATE ROV Control Station</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/main.css">
</head>
<body class="dashboard-root">

<div class="titlebar">
    <div class="titlebar-drag"></div>
    <div class="titlebar-content">
        <span class="titlebar-team">SFS Robotics — MATE 2026</span>
        <span class="titlebar-status">
            <span class="status-dot ready"></span>
            <span>Ready</span>
        </span>
    </div>
</div>

<div class="dashboard">
    
    <div class="left-panel">
        
        <div class="camera-container">
            <div class="camera-header">
                <span class="camera-label">Primary Feed</span>
                <select class="camera-selector" id="camera-select">
                    <option value="main">Main Camera</option>
                    <option value="ch1">Stereo CH01</option>
                    <option value="ch2">Stereo CH02</option>
                </select>
            </div>
            <div class="camera-feed" id="camera-feed">
                <div class="camera-placeholder">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M18 8h.01"/>
                    </svg>
                    <span>No Feed Available</span>
                </div>
            </div>
        </div>

        <div class="status-grid">
            <div class="status-card">
                <div class="status-visual">
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="7" width="18" height="10" rx="2" stroke="var(--text-muted)" fill="none" stroke-width="2"/>
                        <rect x="4" y="9" width="11" height="6" rx="1" fill="var(--green)"/>
                        <path d="M22 10v4" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <div class="status-info">
                    <span class="status-label">Voltage</span>
                    <span class="status-value">12.4V</span>
                </div>
            </div>
            
            <div class="status-card">
                <div class="status-visual">
                    <svg viewBox="0 0 24 24">
                        <rect x="4" y="16" width="3" height="4" rx="1" fill="var(--accent)"/>
                        <rect x="9" y="12" width="3" height="8" rx="1" fill="var(--accent)"/>
                        <rect x="14" y="8" width="3" height="12" rx="1" fill="var(--accent)"/>
                        <rect x="19" y="4" width="3" height="16" rx="1" fill="var(--accent-dim)"/>
                    </svg>
                </div>
                <div class="status-info">
                    <span class="status-label">Signal</span>
                    <span class="status-value">Strong</span>
                </div>
            </div>
            
            <div class="status-card">
                <div class="status-visual depth-gauge">
                    <div class="depth-fill" style="height: 60%;"></div>
                </div>
                <div class="status-info">
                    <span class="status-label">Depth</span>
                    <span class="status-value">2.3m</span>
                </div>
            </div>
            
            <div class="status-card">
                <div class="status-visual">
                    <svg viewBox="0 0 24 24" style="transform: rotate(45deg);">
                        <circle cx="12" cy="12" r="10" stroke="var(--text-muted)" fill="none" stroke-width="2"/>
                        <polygon points="12,4 15,12 12,10 9,12" fill="var(--red)"/>
                        <polygon points="12,20 15,12 12,10 9,12" fill="var(--text-dim)"/>
                    </svg>
                </div>
                <div class="status-info">
                    <span class="status-label">Heading</span>
                    <span class="status-value">045°</span>
                </div>
            </div>
        </div>

        <div class="control-box">
            <div class="control-header">Drive System Mappings</div>
            <div class="control-grid">
                <div class="ctrl-row"><span class="ctrl-btn">RS Y/X</span> <span class="ctrl-desc">Drive (L/R)</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">LS Y</span> <span class="ctrl-desc">Depth (Top)</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">D-U/D</span> <span class="ctrl-desc">Pitch (Top)</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">B/X</span> <span class="ctrl-desc">Rotate Claw 1</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">A</span> <span class="ctrl-desc">Control Claw 1</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">D-L/R</span> <span class="ctrl-desc">Rotate Claw 2</span></div>
                <div class="ctrl-row"><span class="ctrl-btn">D-D</span> <span class="ctrl-desc">Control Claw 2</span></div>
            </div>
        </div>

    </div>

    <div class="right-panel">
        
        <div class="task-selector">
            <button class="task-btn active" data-task="1_2">
                <span class="task-num">1.2</span>
                <span class="task-name">Coral Ridge Model</span>
            </button>
            <button class="task-btn" data-task="2_1">
                <span class="task-num">2.1</span>
                <span class="task-name">Crab Detection</span>
            </button>
            <button class="task-btn" data-task="2_2">
                <span class="task-num">2.2</span>
                <span class="task-name">Iceberg Threat Level</span>
            </button>
        </div>

        <div class="task-content" id="task-content">
            <iframe id="task-frame" src="/t/1_2" frameborder="0" scrolling="yes"></iframe>
        </div>

    </div>

</div>

<script src="../static/js/main.js"></script>
</body>
</html>
